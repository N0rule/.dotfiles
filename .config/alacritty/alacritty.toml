# ── General ───────────────────────────────────────────────────────────────────
[general]
live_config_reload = true

# ── Environment ───────────────────────────────────────────────────────────────
[env]
TERM = "xterm-256color"
WINIT_X11_SCALE_FACTOR = "1"

# ── Window ────────────────────────────────────────────────────────────────────
[window]
dynamic_padding = true
decorations = "full"
title = "Alacritty@CachyOS"
opacity = 0.75
blur = true
decorations_theme_variant = "Dark"

[window.dimensions]
columns = 120
lines = 32

[window.class]
instance = "Alacritty"
general = "Alacritty"

# ── Scrolling ─────────────────────────────────────────────────────────────────
[scrolling]
history = 10000
multiplier = 3

# ── Colors ────────────────────────────────────────────────────────────────────
[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"
dim_foreground = "#7f849c"
bright_foreground = "#cdd6f4"

[colors.cursor]
text   = "#1e1e2e"
cursor = "#c6a0f6"   # Mauve ✨ (was Rosewater #f5e0dc)

[colors.vi_mode_cursor]
text   = "#1e1e2e"
cursor = "#b4befe"   # Lavender — kept to distinguish vi mode visually

[colors.search.matches]
foreground = "#1e1e2e"
background = "#a6adc8"

[colors.search.focused_match]
foreground = "#1e1e2e"
background = "#a6e3a1"

[colors.footer_bar]
foreground = "#1e1e2e"
background = "#a6adc8"

[colors.hints.start]
foreground = "#1e1e2e"
background = "#f9e2af"

[colors.hints.end]
foreground = "#1e1e2e"
background = "#aea9d3"  # Mauve tint ✨ (was #a6adc8)

[colors.selection]
text       = "#cdd6f4"  
background = "#695888"

[colors.normal]
black   = "#313244"   # surface0 (darker than original surface1)
red     = "#ce768e"   # ~15% darker red
green   = "#8dc088"   # ~15% darker green
yellow  = "#d3c094"   # ~15% darker yellow
blue    = "#7499d4"   # ~15% darker blue
magenta = "#c6a0f6"   # Mauve ✨
cyan    = "#7dc0b5"   # ~15% darker cyan
white   = "#d4bfff"   # mauve-white tint

[colors.bright]
black   = "#585b70"   # original surface2
red     = "#f38ba8"   # original bright red
green   = "#a6e3a1"   # original bright green
yellow  = "#f9e2af"   # original bright yellow
blue    = "#89b4fa"   # original bright blue
magenta = "#d4b7f8"   # Mauve brightened ✨
cyan    = "#94e2d5"   # original bright cyan
white   = "#e7dbff"   # mauve-white, more white ✨

[[colors.indexed_colors]]
index = 16
color = "#fab387"

[[colors.indexed_colors]]
index = 17
color = "#c6a0f6"   # Mauve ✨ (was Rosewater #f5e0dc)

# ── Font ──────────────────────────────────────────────────────────────────────
[font]
size = 12

[font.normal]
family = "NotoSansM Nerd Font"
style = "Regular"

[font.bold]
family = "NotoSansM Nerd Font"
style = "Bold"

[font.italic]
family = "NotoSansM Nerd Font"
style = "Italic"

[font.bold_italic]
family = "NotoSansM Nerd Font"
style = "Bold Italic"

# ── Selection ─────────────────────────────────────────────────────────────────
[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"
save_to_clipboard = true

# ── Cursor ────────────────────────────────────────────────────────────────────
[cursor]
style = "Underline"
vi_mode_style = "None"
unfocused_hollow = true
thickness = 0.15

# ── Mouse ─────────────────────────────────────────────────────────────────────
[mouse]
hide_when_typing = true

[[mouse.bindings]]
mouse = "Middle"
action = "PasteSelection"

# ── Keyboard ──────────────────────────────────────────────────────────────────
[keyboard]
[[keyboard.bindings]]
key = "Paste"
action = "Paste"

[[keyboard.bindings]]
key = "Copy"
action = "Copy"

# Ctrl+L
[[keyboard.bindings]]
key = "L"
mods = "Control"
action = "ClearLogNotice"

[[keyboard.bindings]]
key = "Д"  # RU for L
mods = "Control"
action = "ClearLogNotice"

[[keyboard.bindings]]
key = "L"
mods = "Control"
mode = "~Vi"
chars = "\\f"

[[keyboard.bindings]]
key = "Д"  # RU for L
mods = "Control"
mode = "~Vi"
chars = "\\f"

# Shift+PageUp (universal, no letter change)
[[keyboard.bindings]]
key = "PageUp"
mods = "Shift"
mode = "~Alt"
action = "ScrollPageUp"

[[keyboard.bindings]]
key = "PageDown"
mods = "Shift"
mode = "~Alt"
action = "ScrollPageDown"

[[keyboard.bindings]]
key = "Home"
mods = "Shift"
mode = "~Alt"
action = "ScrollToTop"

[[keyboard.bindings]]
key = "End"
mods = "Shift"
mode = "~Alt"
action = "ScrollToBottom"

# Ctrl+Shift+V Paste
[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "Paste"

[[keyboard.bindings]]
key = "М"  # RU for V
mods = "Control|Shift"
action = "Paste"

# Ctrl+Shift+C Copy
[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key = "С"  # RU for C
mods = "Control|Shift"
action = "Copy"

# Ctrl+Shift+F Search Forward
[[keyboard.bindings]]
key = "F"
mods = "Control|Shift"
action = "SearchForward"

[[keyboard.bindings]]
key = "А"  # RU for F
mods = "Control|Shift"
action = "SearchForward"

# Ctrl+Shift+B Search Backward
[[keyboard.bindings]]
key = "B"
mods = "Control|Shift"
action = "SearchBackward"

[[keyboard.bindings]]
key = "И"  # RU for B
mods = "Control|Shift"
action = "SearchBackward"

# Ctrl+Shift+C in Vi mode
[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
mode = "Vi"
action = "ClearSelection"

[[keyboard.bindings]]
key = "С"  # RU for C
mods = "Control|Shift"
mode = "Vi"
action = "ClearSelection"

# Ctrl+0
[[keyboard.bindings]]
key = "Key0"
mods = "Control"
action = "ResetFontSize"

# Ctrl+Q Quit
[[keyboard.bindings]]
key = "Q"
mods = "Control"
action = "Quit"

[[keyboard.bindings]]
key = "Й"  # RU for Q
mods = "Control"
action = "Quit"